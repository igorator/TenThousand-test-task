enum QuestionInputType {
  TEXT
  MULTIPLE_CHOICE
  CHECKBOX
  DATE
}

type Question {
  id: ID!
  text: String!
  type: QuestionInputType!
  required: Boolean!
  options: [String!]
}

type Form {
  id: ID!
  title: String!
  description: String
  questions: [Question!]!
  createdAt: String!
}

type Answer {
  question: Question!
  value: String
  values: [String!]
}

type Response {
  id: ID!
  formId: ID!
  answers: [Answer!]!
  submittedAt: String!
}

input QuestionInput {
  text: String!
  type: QuestionInputType!
  required: Boolean
  options: [String!]
}

input AnswerInput {
  questionId: ID!
  value: String
  values: [String!]
}

type Query {
  forms: [Form!]!
  form(id: ID!): Form
  responses(formId: ID!): [Response!]!
}

type Mutation {
  createForm(title: String!, description: String, questions: [QuestionInput!]): Form!
  submitResponse(formId: ID!, answers: [AnswerInput!]!): Response!
}
